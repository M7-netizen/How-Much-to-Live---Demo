<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a10"/>
      <stop offset="100%" style="stop-color:#0f0f0b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C17A"/>
      <stop offset="100%" style="stop-color:#C9A96E"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="110" fill="none" stroke="#C9A96E" stroke-width="8" opacity="0.3"/>
  <!-- Gold accent line top -->
  <rect x="80" y="100" width="352" height="3" rx="2" fill="url(#gold)" opacity="0.6"/>
  <!-- Gold accent line bottom -->
  <rect x="80" y="409" width="352" height="3" rx="2" fill="url(#gold)" opacity="0.6"/>
  <!-- 帐 character -->
  <text x="256" y="320" 
    font-family="Noto Serif SC, STSong, SimSun, serif" 
    font-size="240" 
    font-weight="400"
    text-anchor="middle" 
    fill="url(#gold)">帐</text>
</svg>